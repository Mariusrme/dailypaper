name: Generate Daily Wallpaper

on:
  schedule:
    # 5 AM UTC = midnight EST / 1 AM EDT in Montreal — earliest safe time to generate "today's" wallpaper
    - cron: '0 5 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow numpy

      - name: Generate wallpaper
        run: python generate.py output/wallpaper.jpg

      - name: Commit and push
        run: |
          git config user.name "DailyPaper Bot"
          git config user.email "bot@dailypaper"
          mkdir -p output
          git add output/wallpaper.jpg
          git rm -f output/wallpaper.png 2>/dev/null || true
          git diff --cached --quiet || git commit -m "wallpaper: $(date -u +%Y-%m-%d)"
          git push

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `DailyPaper generation failed — ${today}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automation']
            });
